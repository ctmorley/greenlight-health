# ─── Azure-equivalent local development stack ──────────────────
# Mirrors Azure production: PostgreSQL + App
# Usage: docker compose -f docker-compose.azure.yml up

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: greenlight
      POSTGRES_USER: greenlight_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SecureDevPassword123!}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenlight_admin -d greenlight"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    environment:
      DATABASE_URL: "postgresql://greenlight_admin:${DB_PASSWORD:-SecureDevPassword123!}@db:5432/greenlight"
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-in-production}
      AUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      NEXT_PUBLIC_SMART_CLIENT_ID: "greenlight-health"
      PHI_ENCRYPTION_KEY: ${PHI_ENCRYPTION_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
