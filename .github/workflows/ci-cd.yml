name: CI/CD — Build, Test, Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  AZURE_WEBAPP_NAME: greenlight-health-app
  AZURE_RESOURCE_GROUP: greenlight-prod

jobs:
  # ─── Type Check + Lint ────────────────────────────────────────
  quality:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit -p tsconfig.check.json
      - run: npm run test:api
      - run: npx next lint
      - name: Build (catch build-only regressions)
        run: npx next build
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
          AUTH_SECRET: "ci-build-secret"

  # ─── Security Scan ────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high || true

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ─── Build + Deploy ──────────────────────────────────────────
  deploy:
    name: Build & Deploy to Azure
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://greenlight-health-app.azurewebsites.net

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js (standalone)
        run: npx next build
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
          AUTH_SECRET: "ci-build-secret"

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/.next
          cp -r .next/standalone/. deploy/
          cp -r .next/static deploy/.next/static
          cp -r public deploy/public
          cp prisma/schema.prisma deploy/prisma/schema.prisma
          cd deploy && zip -r -q ../deploy.zip .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
          type: zip
